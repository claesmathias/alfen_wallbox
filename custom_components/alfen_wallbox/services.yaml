reboot_wallbox:
  description: Reboot alfen wallbox
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "alfen_wallbox.garage"

set_current_limit:
  description: Set current charge limit
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "number.wallbox_current_limit"
    limit:
      description: New limit.
      example: 16

enable_rfid_authorization_mode:
  description: Enables RFID auth mode
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "select.wallbox_authorization_mode"

disable_rfid_authorization_mode:
  description: Disables RFID auth mode
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "select.wallbox_authorization_mode"

set_current_phase:
  description: Set current phase mapping
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "select.wallbox_active_load_balancing_phase_connection"
    phase:
      description: phase.
      example: "L1"

enable_phase_switching:
  description: Enable phase switching
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "switch.wallbox_enable_phase_switching"

disable_phase_switching:
  description: Disable phase switching
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "switch.wallbox_enable_phase_switching"

set_green_share:
  description: Set Green Share Percentage
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "number.wallbox_solar_green_share"
    value:
      description: New value.
      example: 80

set_comfort_power:
  description: Set Solar Comfort Power
  fields:
    entity_id:
      description: Name(s) of entities to change.
      example: "number.wallbox_solar_comfort_level"
    value:
      description: New value.
      example: 1400

get_transactions:
  fields:
    start:
      required: false
      example: "2024-01-01 00:00:00"
      selector:
        datetime:
    end:
      required: false
      example: "2024-01-01 23:00:00"
      selector:
        datetime:

get_charging_profiles:
  description: Get all charging profiles from the wallbox.
  fields:
    entity_id:
      description: Name(s) of entities to query.
      example: "sensor.alfen_wallbox_status_code_socket_1"

add_charging_profile:
  description: Add a charging schedule timeslot.
  fields:
    entity_id:
      description: Name(s) of entities to configure.
      example: "sensor.alfen_wallbox_status_code_socket_1"
    start_time:
      required: true
      description: Start time for the charging timeslot (HH:MM).
      example: "08:00"
      selector:
        text:
    stop_time:
      required: true
      description: Stop time for the charging timeslot (HH:MM).
      example: "10:00"
      selector:
        text:
    max_current:
      required: true
      description: Maximum charging current in Amperes (1-32A).
      example: 16
      selector:
        number:
          min: 1
          max: 32
          unit_of_measurement: A
    recurrency:
      required: false
      description: Recurrence type (DAILY or WEEKLY).
      example: "DAILY"
      default: "DAILY"
      selector:
        select:
          options:
            - "DAILY"
            - "WEEKLY"
    days:
      required: false
      description: Days of the week for WEEKLY recurrence.
      example: ["Monday", "Tuesday"]
      default: []
      selector:
        select:
          multiple: true
          options:
            - "Monday"
            - "Tuesday"
            - "Wednesday"
            - "Thursday"
            - "Friday"
            - "Saturday"
            - "Sunday"

clear_charging_profiles:
  description: Clear all charging profiles from the wallbox.
  fields:
    entity_id:
      description: Name(s) of entities to configure.
      example: "sensor.alfen_wallbox_status_code_socket_1"
